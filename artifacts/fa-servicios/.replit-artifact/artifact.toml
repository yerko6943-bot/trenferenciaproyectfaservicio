kind = "web"
previewPath = "/"
title = "FA Servicios"
version = "1.0.0"
id = "artifacts/fa-servicios"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23864

[services.development]
run = "pnpm --filter @workspace/fa-servicios run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fa-servicios", "run", "build" ]
publicDir = "artifacts/fa-servicios/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23864"
BASE_PATH = "/"
